<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

</head>
<body>
    <script>
        // function-bloxk of code which are designed to perform specific task.
        // 
       function demo(){
        console.log("hello js");

       }
       demo();//function calling
       //finction with parameter
       function demo(text){
        console.log("hello" + text);
       }
       demo("react");
       //function with default parameter
       function add(a,b){
       var num1=a;
       var num2=b;
       var res=num1+num2;
       console.log("addtion of two number is" + res);
       }
       add(11,22);
       //
       function cal(){
        function add(a,b){
            console.log("the addtion is "+(a+b));
        }
        function sub(x,y){
            console.log("the subraction is "+(x-y));
        }
        function mul(p,q){
            console.log("the multiplication is "+(p*q));

        }
        add(11,32);
        sub(12,43);
        mul(12,42);
       }
    cal();
    //anonymous function
    let msg= function(){
        console.log("helllo abes");
    }
    msg();
    // short code for above function
    let msg1=()=>console.log("hello react");
    msg1();
    //arrow function with multiole lines
    let msg2=(age)=>{
        if(age>=18){
            console.log("vaild age");
        }
    }
msg2(23);
// call back function
function cal1(a,b,callback){
    var Num1=a;
    console.log("frist number is "+ Num1);
    var Num2=b;
    console.log("second num is "+Num2);
    var res=Num1+Num2;
    callback(res);
} 
function display(){
    console.log("result is "+ res);
}
cal(4,4,display);

    //callback using setTimeout API

    function greeting(){
        console.log("Hello Students");
    }
    function loading(){
        document.writeln("Data Loading.....");
    }
    loading();
    setTimeout(greeting,2000);

    //callback hell....

    //Javascript Promises-Promises are used to handle asynchronous code more cleanly than traditional callbacks (often referred to as "callback hell"), enabling method chaining and better error management.
        //Promises Stages...
    //pending - operation started (not finished)
    //rejected - operation failed
    //fulfilled - operation completed
    let promise = new Promise(function(resolve,reject){
        let myAge = 23;
        if (myAge>=18){
            resolve("valid age");
        }
        else{
            reject("wait for next year")
        }
    }
);
promise.then(result=>console.log(result)).catch(error=>console.log(error));

//async and await are modern JavaScript keywords that provide a cleaner, more readable syntax for working with Promises.
//They allow asynchronous code to be written in a style that looks and behaves like synchronous code, making complex asynchronous flows easier to manage than traditional .then() chains or callbacks.
 </script> 
</body>
</html>
